<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0B0E11"/>
  <!-- Camera lens ring -->
  <circle cx="96" cy="90" r="46" fill="none" stroke="#2A3037" stroke-width="4"/>
  <circle cx="96" cy="90" r="36" fill="none" stroke="#FF6A1A" stroke-width="3"/>
  <circle cx="96" cy="90" r="22" fill="#FF6A1A" opacity="0.92"/>
  <!-- GPS dot -->
  <circle cx="96" cy="90" r="6" fill="#0B0E11"/>
  <!-- Body top notch -->
  <rect x="60" y="44" width="72" height="18" rx="9" fill="#15191D" stroke="#2A3037" stroke-width="2"/>
  <!-- Geo pin indicator -->
  <circle cx="148" cy="52" r="10" fill="#3DDC84"/>
  <text x="148" y="57" text-anchor="middle" font-family="monospace" font-size="11" fill="#0B0E11" font-weight="bold">+</text>
  <!-- Bottom text -->
  <text x="96" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#8B919A" letter-spacing="2">GEO</text>
</svg>
