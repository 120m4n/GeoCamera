<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- Leaflet tiles come from CARTO CDN — must be allowed in img-src.
       This meta tag covers PWA standalone (service-worker cache) where
       HTTP response headers are absent. The dev/preview server sets the
       same policy via vite.config.js server.headers. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob: https://*.basemaps.cartocdn.com; style-src 'self' 'unsafe-inline'; worker-src 'self'; connect-src 'self'">

  <!-- PWA / iOS -->
  <meta name="theme-color" content="#0B0E11">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoCamera">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">

  <title>GeoCamera</title>
  <link rel="stylesheet" href="/src/styles.css">

</head>
<body>
  <div id="app"></div>

  <!-- Android/Chromium install banner (shown when beforeinstallprompt fires) -->
  <div id="android-banner" style="
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #15191D;
    border-top: 1px solid #2A3037;
    padding: 14px 20px max(env(safe-area-inset-bottom), 14px);
    z-index: 999;
    align-items: center;
    gap: 12px;
  ">
    <span style="flex: 1; font-size: 13px; color: #8B919A; line-height: 1.5;">
      Instala <strong style="color:#F5F3EF">GeoCamera</strong> para acceso rápido sin navegador
    </span>
    <button id="android-install-btn" style="
      background: #FF6A1A;
      border: none;
      border-radius: 10px;
      color: #fff;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    ">Instalar</button>
    <button id="android-dismiss-btn" style="
      background: transparent;
      border: 1px solid #2A3037;
      border-radius: 8px;
      color: #8B919A;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    ">✕</button>
  </div>

  <!-- iOS install banner (shown only in mobile browser, not standalone) -->
  <div id="ios-banner" style="
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #15191D;
    border-top: 1px solid #2A3037;
    padding: 14px 20px max(env(safe-area-inset-bottom), 14px);
    font-size: 13px;
    color: #8B919A;
    z-index: 999;
    text-align: center;
    line-height: 1.5;
  ">
    Para instalar GeoCamera: toca <strong style="color:#F5F3EF">Compartir</strong> →
    <strong style="color:#F5F3EF">Agregar a pantalla de inicio</strong>
    <button style="
      margin-left: 12px;
      background: transparent;
      border: 1px solid #2A3037;
      border-radius: 8px;
      color: #8B919A;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    ">✕</button>
  </div>

  <script type="module" src="/src/app.js"></script>
  <script type="module" src="/src/banner.js"></script>
</body>
</html>
