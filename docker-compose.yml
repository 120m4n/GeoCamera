services:
  geocamera:
    platform: linux/amd64
    image: ghcr.io/120m4n/geocamera:latest
    restart: unless-stopped
    networks:
      traefik_public:
        aliases:
          - geocamera-public
    labels:
      # --- Traefik enable ---
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # --- Router HTTPS ---
      - "traefik.http.routers.geocamera.rule=Host(`geocam.sidis-ingenieria.com`)"
      - "traefik.http.routers.geocamera.tls=true"
      - "traefik.http.routers.geocamera.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.geocamera.entrypoints=websecure"
      - "traefik.http.routers.geocamera.service=geocamera"
      # --- Backend ---
      - "traefik.http.services.geocamera.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 20s

networks:
  traefik_public:
    external: true
