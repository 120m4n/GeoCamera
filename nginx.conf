server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────
    # HSTS: browsers remember HTTPS-only for 1 year after first visit.
    # CSP: block-all-mixed-content prevents any HTTP resource loads + upgrade-insecure-requests as fallback.
    # default-src 'self': only same-origin + data: for SVG/images.
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy    "block-all-mixed-content; default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; media-src 'self' blob:; object-src 'none'" always;
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy         "camera=*, geolocation=*"             always;

    # ── Security header macro ─────────────────────────────────────
    # nginx drops parent add_header directives when a location block defines
    # its own add_header. All location blocks below explicitly repeat security headers.

    # ── Service worker: never cached ─────────────────────────────
    location = /sw.js {
        add_header Cache-Control              "no-cache, no-store, must-revalidate" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "block-all-mixed-content; default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; media-src 'self' blob:; object-src 'none'" always;
        add_header X-Frame-Options            "DENY"                                always;
        add_header X-Content-Type-Options     "nosniff"                             always;
    }

    # ── PWA manifest: short-lived ────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control              "no-cache, no-store, must-revalidate" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "block-all-mixed-content; default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; media-src 'self' blob:; object-src 'none'" always;
        add_header X-Frame-Options            "DENY"                                always;
        add_header X-Content-Type-Options     "nosniff"                             always;
    }

    # ── Vite-hashed assets: immutable for 1 year ─────────────────
    # Security headers repeated explicitly because add_header in a child block
    # replaces all parent add_header directives in nginx.
    location ^~ /assets/ {
        add_header Cache-Control              "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "block-all-mixed-content; default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; media-src 'self' blob:; object-src 'none'" always;
        add_header X-Frame-Options            "DENY"                                always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
        add_header Permissions-Policy         "camera=*, geolocation=*"             always;
        access_log off;
    }

    # ── Images, fonts, icons ─────────────────────────────────────
    location ~* \.(png|webp|svg|ico|woff2|woff|ttf)$ {
        add_header Cache-Control              "public, max-age=86400"                always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "block-all-mixed-content; default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; media-src 'self' blob:; object-src 'none'" always;
        access_log off;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        add_header Cache-Control              "no-cache, no-store, must-revalidate" always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy    "block-all-mixed-content; default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https:; media-src 'self' blob:; object-src 'none'" always;
        add_header X-Frame-Options            "DENY"                                always;
        add_header X-Content-Type-Options     "nosniff"                             always;
        try_files $uri $uri/ /index.html;
    }
}
