server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────
    # Applied to all responses that don't define their own add_header block.
    # For locations that add cache headers, these are repeated explicitly.
    add_header X-Frame-Options          "DENY"                            always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=*, geolocation=*"         always;

    # ── Service worker: never cached ─────────────────────────────
    # Uses `expires` (not add_header) so server-level security headers are inherited.
    location = /sw.js {
        expires -1;
    }

    # ── PWA manifest: short-lived ────────────────────────────────
    location = /manifest.json {
        expires -1;
    }

    # ── Vite-hashed assets: immutable for 1 year ─────────────────
    # Vite appends a content hash to every JS/CSS filename, making them
    # safe to cache forever. add_header here overrides the server-level
    # security headers for this block, which is acceptable for non-HTML assets.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Images, fonts, icons ─────────────────────────────────────
    location ~* \.(png|webp|svg|ico|woff2|woff|ttf)$ {
        expires 30d;
        access_log off;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    # All unmatched paths serve index.html (client-side routing).
    # Inherits security headers from the server block above.
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
